name: DOKS Cost Enforcer CI/CD

on:
  push:
    tags:
      - "v*"

env:
  IMAGE: registry.digitalocean.com/vag/doks-cost-enforcer

jobs:

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "value=sha-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN_V2 }}

      - name: Log in to DO registry
        run: doctl registry login --expiry-seconds 600

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE }}:latest
          cache-to: type=inline

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN_V2 }}

      - name: Set kubeconfig
        run: doctl kubernetes cluster kubeconfig save anubis-gateway-prod

      # ── CRD ────────────────────────────────────────────────────────────────
      - name: Install / upgrade CRD
        run: |
          kubectl apply -f config/crd/bases/platform.mahy.love_nodepoolcostpolicies.yaml
          kubectl wait --for=condition=Established \
            crd/nodepoolcostpolicies.platform.mahy.love \
            --timeout=30s

      - name: Set image tag
        run: |
          TAG=${{ needs.build.outputs.image_tag }}
          sed -i "s|image: .*doks-cost-enforcer:.*|image: ${{ env.IMAGE }}:${TAG}|" \
            config/deploy/deployment.yaml
          echo "Deploying image: ${{ env.IMAGE }}:${TAG}"

      - name: Apply deploy manifests
        run: kubectl apply -f config/deploy/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/doks-cost-enforcer \
            -n doks-cost-enforcer-system \
            --timeout=120s